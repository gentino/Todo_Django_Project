{% extends '../index.html' %}

{% block title %}   Todo -Login    {% endblock %}

{% block content %}

<div class="flex h-screen items-center justify-center bg-gray-100">
<form method="POST" class="bg-white p-8 rounded-lg shadow-md w-96">
    {% csrf_token %}
    <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
    <small class="text-red-600  block m-2 text-center">{{ form.non_field_errors }}</small>
    <div class="mb-4">
        <label class="block text-gray-700 text-sm font-bold mb-2"> Username</label>
        {{ form.username}}

        
    </div>

    <div class="mb-4">
        <label class="block text-gray-700 text-sm font-bold mb-2"> Password</label>
        {{form.password}}
    </div>   


    <button class="p-2 w-full bg-red-600 font-medium rounded-lg  text-gray-100">Login </button>
          <p  class="text-xs mt-3">Are you a new user ?  <a href="{% url 'signup' %}" class="font-bold text-blue-600">Register here </a></p>
    </form>

</div>
{% endblock %}
